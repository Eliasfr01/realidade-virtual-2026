<html>
  <head>
    <title>Primeira experiência de realidade aumentade usando AR.js e o A-frame. Marcador miro e modelos 3D do A-frame.</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden">
    <a-scene vr-node-ui="enable: false" embedded arjs="dejubgUIEnable: false">
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" color:"green"></a-box>
        <!-- <a-cone position="0 1 0" material = color:"red"></a-cone> -->
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
